apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-jenkins-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-jenkins-deployment
  template:
    metadata:
      labels:
        app: spring-jenkins-deployment
    spec:
      containers:
      - name: spring-boot-app
        image: spring-jenkins-deployment:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
